# devloop binding anchor (b) — AUTHORITATIVE fail-closed required check (design §5.1/§10.1).
# Copied into a target repo by `/devloop:init` and registered as a REQUIRED status check on
# the protected runner. It fails closed unless a HUMAN (CODEOWNER — not the agent, not the PR
# author) approved the current HEAD, and the diff does not touch the protected set. A skipped
# human stop becomes a visible RED gap, not a silent pass; the agent cannot self-approve.
#
# This file MUST contain the string "devloop-precondition-check" so checkGuardians() can
# verify the binding anchor is wired in the target repo (it is itself a guardian).
#
# Event handling (critical): this runs on BOTH pull_request and pull_request_review (the latter
# so the human Approve re-triggers the check). On pull_request_review the workflow-level
# `github.base_ref` is EMPTY and checkout would default to the base — so we always check out the
# PR HEAD (pull_request.head.sha) and read the base from pull_request.base.ref.
#
# Also enforce, OUTSIDE this workflow, via Branch Protection (the t3-merge stop):
#   - Require a review from CODEOWNERS  - Dismiss stale approvals on push
#   - Do not allow the agent identity to approve/merge  - Require this check to pass

name: devloop-precondition-check
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

jobs:
  devloop-precondition-check:
    runs-on: ubuntu-latest
    env:
      # base.ref / head.sha are present on BOTH events; github.base_ref is NOT (empty on review).
      BASE: ${{ github.event.pull_request.base.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }} # the PR HEAD, on both events
          fetch-depth: 0

      # Make origin/$BASE exist for the diffs (checkout fetched HEAD, not necessarily the base).
      - name: Fetch base
        run: git fetch origin "+refs/heads/$BASE:refs/remotes/origin/$BASE" || true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # devloop's CLIs run from node_modules/devloop/dist — they must be installed first.
      - name: Install dependencies
        run: |
          set -euo pipefail
          corepack enable || true
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile;
          elif [ -f yarn.lock ]; then yarn install --frozen-lockfile;
          else npm ci; fi

      - name: Compute the AUTHORITATIVE tier from the diff (not agent-declared, §9/§10)
        run: |
          set -o pipefail
          DIFF=$(git diff --name-only "origin/$BASE"...HEAD | jq -R . | jq -s .)
          # repo mode: devloop locates the repo's tier-map itself (.devloop/ -> tools/ -> root)
          jq -n --argjson touched "$DIFF" '{touched:$touched, repo:"."}' \
            | node node_modules/devloop/dist/cli/derive-tier.js > tier.json
          cat tier.json

      - name: Verify HUMAN approval on HEAD + no gate-tamper (fail-closed)
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -o pipefail
          # Reviews from GitHub (the authoritative, unforgeable channel).
          REVIEWS=$(gh api "repos/${{ github.repository }}/pulls/$PR/reviews" \
            --jq '[.[] | {user: .user.login, state: .state, commit_id: .commit_id}]')
          DIFF=$(git diff --name-only "origin/$BASE"...HEAD | jq -R . | jq -s .)
          # botLogins / humanReviewers (CODEOWNERS) come from .devloop config in the repo.
          jq -n \
            --argjson reviews "$REVIEWS" \
            --arg prAuthor "$AUTHOR" \
            --arg headSha "$HEAD_SHA" \
            --argjson bots "$(cat .devloop/bot-logins.json)" \
            --argjson diff "$DIFF" \
            --argjson protected "$(cat .devloop/protected-globs.json)" \
            '{reviews:$reviews, prAuthor:$prAuthor, headSha:$headSha, botLogins:$bots, diffPaths:$diff, protectedGlobs:$protected}' \
            | node node_modules/devloop/dist/cli/verify-review.js

      - name: Verify implement only un-skipped tests (test<->code seam, §11 #3)
        run: |
          # On the implement PR, every changed *.test.* file may differ from base ONLY by
          # removed `.skip`. Authoring/editing tests in implement is forbidden (fail-closed).
          node node_modules/devloop/dist/cli/verify-unskip.js . "origin/$BASE"
